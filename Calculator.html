<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.calculator{
    width:420px;
    background:#1f2937;
    padding:20px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.4);
}

h2{
    text-align:center;
    color:#fff;
    margin-bottom:15px;
}

#display{
    width:100%;
    height:70px;
    font-size:28px;
    text-align:right;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    background:#fff;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

.operator{
    background:#2563eb;
    color:#fff;
}

.equal{
    background:#16a34a;
    color:#fff;
}

.clear{
    background:#dc2626;
    color:#fff;
}

.number{
    background:#374151;
    color:#fff;
}
</style>
</head>
<body>

<div class="calculator">

<h2>Scientific Calculator</h2>

<input type="text" id="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">AC</button>
<button class="operator" onclick="backspace()">⌫</button>
<button class="operator" onclick="append('%')">%</button>
<button class="operator" onclick="append('/')">÷</button>
<button class="operator" onclick="append('*')">×</button>

<button class="operator" onclick="func('sin')">sin</button>
<button class="operator" onclick="func('cos')">cos</button>
<button class="operator" onclick="func('tan')">tan</button>
<button class="operator" onclick="append('-')">-</button>
<button class="operator" onclick="append('+')">+</button>

<button class="operator" onclick="func('sqrt')">√</button>
<button class="operator" onclick="append('(')">(</button>
<button class="operator" onclick="append(')')">)</button>
<button class="operator" onclick="append('**')">xʸ</button>
<button class="operator" onclick="func('square')">x²</button>

<button class="number" onclick="append('7')">7</button>
<button class="number" onclick="append('8')">8</button>
<button class="number" onclick="append('9')">9</button>
<button class="operator" onclick="func('log')">log</button>
<button class="operator" onclick="func('ln')">ln</button>

<button class="number" onclick="append('4')">4</button>
<button class="number" onclick="append('5')">5</button>
<button class="number" onclick="append('6')">6</button>
<button class="operator" onclick="append('Math.PI')">π</button>
<button class="operator" onclick="append('Math.E')">e</button>

<button class="number" onclick="append('1')">1</button>
<button class="number" onclick="append('2')">2</button>
<button class="number" onclick="append('3')">3</button>
<button class="operator" onclick="func('factorial')">n!</button>
<button class="operator" onclick="append('**0.5')">√x</button>

<button class="number" onclick="append('0')">0</button>
<button class="number" onclick="append('.')">.</button>
<button class="operator" onclick="append('00')">00</button>
<button class="equal" onclick="calculate()">=</button>
<button class="operator" onclick="append(',')">,</button>

</div>

</div>

<script>

const display=document.getElementById("display");

function append(value){
display.value+=value;
}

function clearDisplay(){
display.value="";
}

function backspace(){
display.value=display.value.slice(0,-1);
}

function factorial(n){
n=Number(n);
if(n<0) return "Error";
let result=1;
for(let i=2;i<=n;i++) result*=i;
return result;
}

function func(type){

let val=display.value;

if(val==="") return;

try{

switch(type){

case "sin":
display.value=Math.sin(eval(val)*Math.PI/180);
break;

case "cos":
display.value=Math.cos(eval(val)*Math.PI/180);
break;

case "tan":
display.value=Math.tan(eval(val)*Math.PI/180);
break;

case "sqrt":
display.value=Math.sqrt(eval(val));
break;

case "square":
display.value=Math.pow(eval(val),2);
break;

case "log":
display.value=Math.log10(eval(val));
break;

case "ln":
display.value=Math.log(eval(val));
break;

case "factorial":
display.value=factorial(eval(val));
break;

}

}catch{
display.value="Error";
}

}

function calculate(){

try{

let result=eval(display.value);

if(result===undefined)
display.value="";

else
display.value=result;

}catch{

display.value="Error";

}

}

document.addEventListener("keydown",function(e){

if((e.key>='0'&&e.key<='9') || "+-*/().".includes(e.key)){
append(e.key);
}

if(e.key==="Enter"){
calculate();
}

if(e.key==="Backspace"){
backspace();
}

if(e.key==="Escape"){
clearDisplay();
}

});

</script>

</body>
</html>
